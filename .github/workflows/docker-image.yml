name: Docker Image CI

on:
  push:
    branches: [ "master" ]
#  pull_request:
#    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    -
      name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}


    - uses: actions/checkout@v3
    - name: Build the Docker image for master
      run: cd master; docker build . --file Dockerfile -t snowrabbitio/master;cd ..

    - uses: actions/checkout@v3
    - name: Build the Docker image for probe
      run: cd probe; docker build . --file Dockerfile -t snowrabbitio/probe



    -
      name: Build and push
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: snowrabbit/master:latest


