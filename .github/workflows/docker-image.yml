jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    # Login to docker hub
    -
      name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

